  <style>
    :root {
      --green-deep:   #1a3a2a;
      --green-mid:    #2d5e42;
      --green-light:  #4a8c64;
      --gold:         #c9a84c;
      --gold-light:   #e8c97a;
      --cream:        #f5f0e8;
      --text-dark:    #1a1a1a;
      --text-muted:   #5a5a5a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--cream);
      color: var(--text-dark);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body[dir="rtl"] {
      font-family: 'Tajawal', sans-serif;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(45,94,66,.15) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(201,168,76,.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .border-top {
      height: 6px;
      background: linear-gradient(90deg, var(--green-deep), var(--gold), var(--green-mid), var(--gold-light), var(--green-deep));
      background-size: 400% 100%;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 400% 50%; }
    }

    /* Language Switcher */
    .lang-bar {
      position: relative; z-index: 10;
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: 8px; padding: 16px 24px 0;
    }
    .lang-btn {
      font-family: 'Tajawal', sans-serif;
      font-size: .8rem; font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid rgba(201,168,76,.4);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .lang-btn:hover { border-color: var(--gold); color: var(--green-deep); }
    .lang-btn.active {
      background: var(--green-deep);
      color: var(--gold-light);
      border-color: var(--green-deep);
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 48px 24px 48px;
    }
    .logo-ring {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(26,58,42,.25), 0 0 0 2px var(--gold);
      animation: fadeDown .8s ease both;
    }
    .logo-ring svg { width: 40px; height: 40px; fill: var(--gold-light); }
    header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--green-deep);
      letter-spacing: .04em;
      animation: fadeDown .8s .1s ease both;
    }
    body[dir="rtl"] header h1 { font-family: 'Tajawal', sans-serif; }
    header .subtitle {
      font-family: 'Tajawal', sans-serif;
      font-weight: 300;
      font-size: .95rem;
      color: var(--text-muted);
      margin-top: 8px;
      animation: fadeDown .8s .2s ease both;
    }
    .divider {
      display: flex; align-items: center; gap: 12px;
      max-width: 320px;
      margin: 32px auto 0;
      animation: fadeDown .8s .3s ease both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .divider::after { background: linear-gradient(90deg, var(--gold), transparent); }
    .divider-gem { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); border-radius: 1px; }
    main {
      position: relative; z-index: 1;
      max-width: 740px; margin: 0 auto;
      padding: 0 24px 80px;
    }
    .meta {
      text-align: center;
      font-family: 'Tajawal', sans-serif;
      font-size: .85rem; color: var(--text-muted);
      margin-bottom: 48px;
      animation: fadeUp .8s .4s ease both;
    }
    section { margin-bottom: 40px; animation: fadeUp .7s ease both; }
    section:nth-child(1) { animation-delay: .45s; }
    section:nth-child(2) { animation-delay: .5s; }
    section:nth-child(3) { animation-delay: .55s; }
    section:nth-child(4) { animation-delay: .6s; }
    section:nth-child(5) { animation-delay: .65s; }
    section:nth-child(6) { animation-delay: .7s; }
    section:nth-child(7) { animation-delay: .75s; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .section-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--green-deep); color: var(--gold-light);
      font-family: 'Tajawal', sans-serif; font-size: .8rem; font-weight: 500;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    h2 { font-size: 1.1rem; font-weight: 600; color: var(--green-deep); letter-spacing: .02em; }
    p { font-size: .97rem; line-height: 1.85; color: #2a2a2a; }
    ul { list-style: none; margin-top: 10px; }
    ul li { position: relative; padding-left: 20px; font-size: .95rem; line-height: 1.8; color: #2a2a2a; }
    ul li::before { content: '◆'; position: absolute; left: 0; font-size: .45rem; color: var(--gold); top: .6em; }
    body[dir="rtl"] ul li { padding-left: 0; padding-right: 20px; }
    body[dir="rtl"] ul li::before { left: auto; right: 0; }
    .highlight {
      background: linear-gradient(135deg, rgba(26,58,42,.06), rgba(201,168,76,.08));
      border-left: 3px solid var(--gold);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px; margin-top: 12px;
    }
    body[dir="rtl"] .highlight {
      border-left: none;
      border-right: 3px solid var(--gold);
      border-radius: 8px 0 0 8px;
    }
    .highlight p { font-size: .93rem; }
    a { color: var(--green-mid); text-decoration: none; border-bottom: 1px solid var(--gold); }
    a:hover { color: var(--gold); }
    footer {
      position: relative; z-index: 1;
      text-align: center; padding: 24px;
      border-top: 1px solid rgba(201,168,76,.3);
      font-family: 'Tajawal', sans-serif;
      font-size: .82rem; color: var(--text-muted);
    }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
    @media (max-width: 480px) { header { padding: 32px 16px 32px; } main { padding: 0 16px 60px; } }
  </style>
</head>

function setLang(code) {
  const t = translations[code];
  document.documentElement.lang = t.lang;
  document.body.dir = t.dir;
  document.title = t.title;

  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('meta').textContent = t.meta;

  document.getElementById('s1-title').textContent = t.s1.title;
  document.getElementById('s1-body').textContent = t.s1.body;

  document.getElementById('s2-title').textContent = t.s2.title;
  document.getElementById('s2-body').textContent = t.s2.body;
  const s2list = document.getElementById('s2-list');
  s2list.innerHTML = t.s2.list.map(item => `<li>${item}</li>`).join('');
  document.getElementById('s2-note').innerHTML = t.s2.note;

  document.getElementById('s3-title').textContent = t.s3.title;
  document.getElementById('s3-body').innerHTML = t.s3.body;

  document.getElementById('s4-title').textContent = t.s4.title;
  document.getElementById('s4-body').textContent = t.s4.body;
  const s4list = document.getElementById('s4-list');
  s4list.innerHTML = t.s4.list.map(item => `<li>${item}</li>`).join('');

  document.getElementById('s5-title').textContent = t.s5.title;
  document.getElementById('s5-body').textContent = t.s5.body;

  document.getElementById('s6-title').textContent = t.s6.title;
  document.getElementById('s6-body').textContent = t.s6.body;

  document.getElementById('s7-title').textContent = t.s7.title;
  document.getElementById('s7-body').textContent = t.s7.body;

  document.getElementById('footer').textContent = t.footer;

  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${code}')"]`).classList.add('active');
}

setLang('tr');
</script>
